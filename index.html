<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Удостоверение личности</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body>

<div class="app-container">
    <header>
        <button class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <h1 class="header-title">Удостоверение личности</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="tabs-wrapper">
        <div class="tabs-container">
            <button class="tab-btn active">Документ</button>
            <button class="tab-btn">Реквизиты</button>
        </div>
    </div>

    <div class="cards-wrapper">
        <input type="file" id="fileInput" accept="image/*, application/pdf" hidden>
        
        <div class="card-mockup" onclick="document.getElementById('fileInput').click()">
            <img id="previewImg" class="preview-img" src="" alt="" style="display:none;">
            <embed id="pdfPreview" class="preview-pdf" src="" type="application/pdf" style="display:none;">
            <span class="upload-text" id="uploadText">Нажмите для загрузки удостоверения</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-primary">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Предъявить документ
        </button>
        <button class="btn-secondary">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
            Отправить документ
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
