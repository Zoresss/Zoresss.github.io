<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удостоверение личности</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <button class="back-btn">←</button>
        <h1>Удостоверение личности</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active">Документ</button>
        <button class="tab-btn">Реквизиты</button>
    </div>

    <div class="document-viewer">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="placeholder" onclick="document.getElementById('fileInput').click()">
            <img id="preview" src="" alt="" style="display:none; max-width: 100%;">
            <span id="placeholder-text">Нажмите, чтобы загрузить фото</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-primary">Предъявить документ</button>
        <button class="btn-secondary">Отправить документ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
